name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Run linting
        run: |
          flake8 src api tests --max-line-length=100

      - name: Run automated tests
        run: |
          pytest tests/ -v --disable-warnings

      - name: Verify model file
        run: |
          test -f models/heart_disease_pipeline.joblib

      - name: Build Docker image
        run: |
          docker build -t heart-disease-api:test .

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-model
          path: models/heart_disease_pipeline.joblib