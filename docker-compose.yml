services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heart-disease-api
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: heart-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: heart-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
